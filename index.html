<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User-cloud Halupedia Generator</title>
    
    <!-- Marked.js for robust Markdown parsing -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f6f6f6;
            color: #202124;
            transition: background-color 0.3s, color 0.3s;
        }
        h1.main-title { font-family: 'Georgia', serif; font-size: 2.2rem; margin-bottom: 5px; color: #000; }
        
        .api-key-container { 
            margin-bottom: 25px; 
            background: #e8f0fe; 
            padding: 15px; 
            border-radius: 6px; 
            border: 1px solid #d2e3fc; 
        }
        .api-key-input { 
            width: 100%; 
            padding: 10px; 
            margin-top: 8px; 
            border: 1px solid #ccc; 
            border-radius: 4px; 
            box-sizing: border-box; 
            font-family: monospace;
        }

        .action-area { margin-bottom: 30px; }
        .generate-btn { padding: 14px 28px; font-size: 16px; background-color: #3c4043; color: white; border: 1px solid #3c4043; border-radius: 4px; cursor: pointer; font-weight: 500; transition: background-color 0.2s; }
        .generate-btn:hover:not(:disabled) { background-color: #202124; }
        .generate-btn:disabled { background-color: #cccccc; border-color: #cccccc; cursor: not-allowed; }
        
        #wiki-sandbox { background-color: #fff; border: 1px solid #a2a9b1; padding: 30px 40px; min-height: 400px; line-height: 1.6; box-shadow: 0 1px 4px rgba(0,0,0,0.05); transition: background-color 0.3s, border-color 0.3s; }
        #wiki-sandbox h1 { font-family: 'Georgia', serif; font-size: 1.8rem; border-bottom: 1px solid #a2a9b1; padding-bottom: 5px; margin-top: 0; margin-bottom: 20px; }
        #wiki-sandbox h2, #wiki-sandbox h3 { font-family: 'Georgia', serif; font-size: 1.4rem; border-bottom: 1px solid #a2a9b1; padding-bottom: 3px; margin-top: 30px; margin-bottom: 15px; }
        #wiki-sandbox p { margin-top: 0; margin-bottom: 1.2em; text-align: justify; }
        #wiki-sandbox blockquote { background: #f8f9fa; border-left: 4px solid #eaecf0; margin: 15px 0; padding: 15px 20px; font-style: italic; }
        #wiki-sandbox cite { display: block; font-size: 0.85rem; color: #54595d; margin-top: 8px; font-style: normal; }
        .wiki-link { color: #0645ad; text-decoration: none; cursor: pointer; }
        .wiki-link:hover { text-decoration: underline; }
        .loading-text { color: #72777d; font-style: italic; }

        @media (prefers-color-scheme: dark) {
            body { background-color: #121212; color: #e0e0e0; }
            h1.main-title { color: #ffffff; }
            .api-key-container { background: #1e2532; border-color: #3b4b6b; }
            .api-key-input { background: #202124; color: #fff; border-color: #555; }
            #wiki-sandbox { background-color: #1e1e1e; border-color: #333; box-shadow: none; }
            #wiki-sandbox h1, #wiki-sandbox h2, #wiki-sandbox h3 { border-bottom-color: #333; }
            #wiki-sandbox blockquote { background: #2a2a2a; border-left-color: #444; }
            #wiki-sandbox cite { color: #a0a0a0; }
            .wiki-link { color: #8ab4f8; }
            .generate-btn { background-color: #4CAF50; color: #fff; border-color: #4CAF50; }
            .generate-btn:hover:not(:disabled) { background-color: #45a049; }
            .generate-btn:disabled { background-color: #333; border-color: #333; color: #666; }
        }
    </style>
</head>
<body>

    <h1 class="main-title">User-cloud Halupedia Generator</h1>
    
    <div class="api-key-container">
        <label for="api-key-input" style="font-weight: bold;">Google AI Studio API Key</label>
        <br>
        <span style="font-size: 12px; color: #666;">Get a free key from <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a>. Stored locally in your browser.</span>
        <input type="password" id="api-key-input" class="api-key-input" placeholder="AIzaSy...">
    </div>

    <div class="action-area">
        <button id="submit-btn" class="generate-btn">Generate Random Article</button>
    </div>

    <div id="wiki-sandbox">Click the button above to have the AI invent an entirely new topic from scratch...</div>

    <script>
        const apiKeyInput = document.getElementById('api-key-input');
        const submitBtn = document.getElementById('submit-btn');
        const sandbox = document.getElementById('wiki-sandbox');

        let generationCount = 0;
        let previousTitles = [];
        let browsingHistory = []; 

        // Load saved API key on startup
        window.addEventListener('DOMContentLoaded', () => {
            const savedKey = localStorage.getItem('halupedia_api_key');
            if (savedKey) apiKeyInput.value = savedKey;
        });

        // Wrapper function to call Gemini via REST API
        async function callGeminiAPI(prompt, systemPrompt, temperature, topK) {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) throw new Error("Please enter a Google AI Studio API Key.");
            
            // Save key locally
            localStorage.setItem('halupedia_api_key', apiKey);

            const url = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${apiKey}`;
            const requestBody = {
                systemInstruction: { parts: [{ text: systemPrompt }] },
                contents: [{ role: "user", parts: [{ text: prompt }] }],
                generationConfig: { temperature: temperature, topK: topK }
            };

            const response = await fetch(url, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(requestBody)
            });

            if (!response.ok) {
                const err = await response.json();
                throw new Error(err.error?.message || "API Request Failed");
            }

            const data = await response.json();
            return data.candidates[0].content.parts[0].text;
        }

        function buildLoreBuffer() {
            if (browsingHistory.length === 0) return "";
            
            const currentPage = browsingHistory[browsingHistory.length - 1];
            const previousPage = browsingHistory.length > 1 ? browsingHistory[browsingHistory.length - 2] : null;

            let lore = `\nFOR WORLD-BUILDING CONSISTENCY, base this new article on the user's recent reading history:\n`;
            lore += `\nCurrently Reading (MUST relate to this): \nTITLE: ${currentPage.title}\nTEXT: ${currentPage.text}\n`;
            
            if (previousPage) {
                lore += `\nPreviously Read (Thematic background): \nTITLE: ${previousPage.title}\nTEXT: ${previousPage.text}\n`;
            }

            return lore;
        }

        window.openWikiPage = async function(targetTopic) {
            generateArticle(targetTopic);
        };

        async function generateArticle(targetTopic = "") {
            submitBtn.disabled = true;
            
            if (!apiKeyInput.value.trim()) {
                sandbox.innerHTML = `<span style="color:red;">Error: Please enter your Google AI Studio API key above before generating.</span>`;
                submitBtn.disabled = false;
                return;
            }
            
            if (targetTopic) {
                sandbox.innerHTML = `<span class="loading-text">Consulting historical records for <strong>"${targetTopic}"</strong>... (Waiting for Gemini 2.5 Flash)</span>`;
            } else {
                sandbox.innerHTML = `<span class="loading-text">Brainstorming a bizarre, non-existent topic... (Waiting for Gemini 2.5 Flash)</span>`;
            }

            let selectedTopic = targetTopic;

            try {
                generationCount++;

                // =======================================================
                // STAGE 1: Topic Generation (Only if no target provided)
                // =======================================================
                if (!selectedTopic) {
                    const titleSystemPrompt = `You are a creative brainstorming engine for Halupedia. Output ONLY ONE short title string for a fictional wiki article. It must sound highly bureaucratic, academic, or absurd.`;
                    let titlePrompt = `Invent a brand new, formal encyclopedia topic title that is incredibly strange but historically authentic.`;
                    
                    if (previousTitles.length > 0) {
                        titlePrompt += `\nCRITICAL: This title MUST be completely different from these previous topics: ${previousTitles.join(" | ")}.`;
                    }
                    titlePrompt += `\nRESPOND WITH THE TITLE ONLY. No explanations.`;

                    const rawTitle = await callGeminiAPI(titlePrompt, titleSystemPrompt, 0.9, 40);
                    
                    const titleLines = rawTitle.split('\n').filter(line => line.trim().length > 0);
                    let firstLine = titleLines[0] || "Unknown Topic";
                    firstLine = firstLine.replace(/^(Title:|Topic:|\*\*Title:\*\*)\s*/i, ''); 
                    selectedTopic = firstLine.replace(/["'#`\.*]/g, "").trim();
                    
                    previousTitles.push(selectedTopic);
                    sandbox.innerHTML = `<span class="loading-text">Discovered Archive: <strong>"${selectedTopic}"</strong>.<br>Drafting full encyclopedia entry...</span>`;
                }

                // =======================================================
                // STAGE 2: Article Generation
                // =======================================================
                const loreBuffer = buildLoreBuffer();

                const articleSystemPrompt = `You are the sole author of Halupedia, an encyclopedia of things that do not exist. You write encyclopedia articles in a deadpan, matter-of-fact tone — the exact style of Wikipedia — about subjects that are completely ridiculous, absurd, or logically impossible.`;
                let finalPrompt = `${loreBuffer}

Write a 350-word encyclopedia entry for the topic: ${selectedTopic}.

CRITICAL RULES:
1. Emulate Wikipedia's tone perfectly.
2. Use Wikitext double-brackets to link to 3 or 4 other invented, bizarre encyclopedia articles (e.g., "This was heavily regulated by [[The Ministry of Slight Breezes]].")
3. End the article with a quotation from a fictional academic, starting the line with the > symbol.
4. Do NOT output markdown code blocks, lists, or bullet points. Use simple paragraphs and headers (##).`;

                if (generationCount > 1 && !targetTopic) {
                    finalPrompt += `\n- Ensure the concepts and structure are completely different from previous articles.`;
                } else if (targetTopic && browsingHistory.length > 0) {
                    finalPrompt += `\n- Since the user clicked a link to arrive here, make sure this article naturally connects to the 'Currently Reading' topic in the lore buffer.`;
                }

                const rawArticleText = await callGeminiAPI(finalPrompt, articleSystemPrompt, 0.9, 50);

                let cleanText = rawArticleText.replace(/```(html|markdown)?/gi, '').replace(/```/g, '');
                cleanText = cleanText.replace(/([\.!?])\s*\n?\s*(>)/g, '$1\n\n$2');
                
                let htmlContent = marked.parse(cleanText);
                
                // Turn AI's [[Funny Topic]] into a clickable link
                htmlContent = htmlContent.replace(/\[\[(.*?)\]\]/g, `<a href="#" class="wiki-link" onclick="openWikiPage('$1'); return false;">$1</a>`);
                
                // =======================================================
                // STAGE 3: The Quote "Safety Net" & History Saving
                // =======================================================
                if (!htmlContent.includes('<blockquote>')) {
                    htmlContent = htmlContent.replace(/<p>(.*?)<\/p>\s*$/, '<blockquote>$1<cite>— Historical Records Office</cite></blockquote>');
                } else {
                    htmlContent = htmlContent.replace(/<\/blockquote>/g, '<cite>— Historical Records Office</cite></blockquote>');
                }
                
                sandbox.innerHTML = `<h1>${selectedTopic}</h1>` + htmlContent;

                // Save to Browsing History for the next generation's Lore Buffer
                let plainText = htmlContent.replace(/<[^>]+>/g, ''); // Strip HTML tags
                browsingHistory.push({ title: selectedTopic, text: plainText });

            } catch (err) {
                console.error(err);
                sandbox.innerHTML = `<span style="color:red;">Generation error: ${err.message}</span>`;
            } finally {
                submitBtn.disabled = false;
            }
        }

        submitBtn.addEventListener('click', () => generateArticle(""));
    </script>
</body>
</html>
